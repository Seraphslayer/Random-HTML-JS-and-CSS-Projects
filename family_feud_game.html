<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Feud Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 3rem;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            margin-bottom: 10px;
        }

        .question-display {
            background: linear-gradient(45deg, #FF6B35, #F7931E);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border: 4px solid #FFD700;
        }

        .question-text {
            font-size: 1.5rem;
            color: white;
            text-align: center;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        .game-board {
            background: radial-gradient(ellipse at center, #FF6B35 0%, #D2691E 100%);
            border: 8px solid #FFD700;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .game-board::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 10px 10px, #FFD700 2px, transparent 2px),
                radial-gradient(circle at 30px 30px, #FFD700 1px, transparent 1px);
            background-size: 40px 40px, 20px 20px;
            opacity: 0.3;
            pointer-events: none;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        .answer-item {
            background: linear-gradient(145deg, #1a237e, #283593);
            border: 3px solid #FFD700;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .answer-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            background: linear-gradient(145deg, #303f9f, #3949ab);
        }

        .answer-item.revealed {
            background: linear-gradient(145deg, #4caf50, #66bb6a);
            animation: revealAnswer 0.5s ease;
        }

        .answer-item.wrong {
            background: linear-gradient(145deg, #f44336, #ef5350);
            animation: wrongAnswer 0.5s ease;
        }

        @keyframes revealAnswer {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes wrongAnswer {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }

        .answer-number {
            background: #FFD700;
            color: #000;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .answer-text {
            flex: 1;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
        }

        .answer-points {
            background: #FFD700;
            color: #000;
            padding: 5px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1rem;
        }

        .hidden-text {
            visibility: hidden;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: #000;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            background: linear-gradient(145deg, #FFA500, #FF8C00);
        }

        .score {
            text-align: center;
            margin-top: 20px;
            font-size: 1.5rem;
            color: #FFD700;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .setup-panel {
            background: rgba(0,0,0,0.9);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .setup-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .setup-title {
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
            color: #1e3c72;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .answer-setup {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .hidden {
            display: none;
        }

        .strikes {
            text-align: center;
            margin-top: 15px;
            font-size: 2rem;
            color: #ff4444;
            font-weight: bold;
        }

        .x-mark {
            display: inline-block;
            margin: 0 10px;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }
            
            .answers-grid {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1 class="title">FAMILY FEUD</h1>
        </div>

        <div class="question-display">
            <div class="question-text" id="questionText">We asked 100 people...</div>
        </div>

        <div class="game-board">
            <div class="answers-grid" id="answersGrid">
                <!-- Answers will be populated here -->
            </div>
        </div>

        <div class="strikes" id="strikes">
            <!-- X marks will appear here -->
        </div>

        <div class="score" id="score">Score: 0</div>

        <div class="controls">
            <button class="btn" onclick="revealAnswer()">Reveal Answer</button>
            <button class="btn" onclick="addStrike()">Wrong Answer (X)</button>
            <button class="btn" onclick="resetGame()">New Game</button>
            <button class="btn" onclick="showSetup()">Customize</button>
        </div>
    </div>

    <!-- Setup Panel -->
    <div class="setup-panel" id="setupPanel">
        <div class="setup-content">
            <h2 class="setup-title">Customize Your Game</h2>
            
            <div class="form-group">
                <label for="questionInput">Question:</label>
                <textarea id="questionInput" placeholder="Name something you find in a kitchen..."></textarea>
            </div>

            <div class="form-group">
                <label>Answers (Top 8):</label>
                <div id="answersSetup">
                    <!-- Answer inputs will be generated here -->
                </div>
            </div>

            <div class="controls">
                <button class="btn" onclick="saveGame()">Start Game</button>
                <button class="btn" onclick="loadSampleGame()">Load Sample</button>
            </div>
        </div>
    </div>

    <script>
        let currentGame = {
            question: "",
            answers: [],
            revealedAnswers: [],
            strikes: 0,
            score: 0,
            currentAnswerIndex: 0
        };

        function initializeSetup() {
            const answersSetup = document.getElementById('answersSetup');
            answersSetup.innerHTML = '';
            
            for (let i = 0; i < 8; i++) {
                const answerDiv = document.createElement('div');
                answerDiv.className = 'answer-setup';
                answerDiv.innerHTML = `
                    <input type="text" id="answer${i}" placeholder="Answer ${i + 1}">
                    <input type="number" id="points${i}" placeholder="Points" min="1" max="99">
                `;
                answersSetup.appendChild(answerDiv);
            }
        }

        function loadSampleGame() {
            document.getElementById('questionInput').value = "Name something you find in a kitchen";
            
            const sampleAnswers = [
                { text: "REFRIGERATOR", points: 25 },
                { text: "STOVE/OVEN", points: 22 },
                { text: "SINK", points: 18 },
                { text: "MICROWAVE", points: 12 },
                { text: "DISHES", points: 8 },
                { text: "FOOD", points: 7 },
                { text: "CABINETS", points: 4 },
                { text: "DISHWASHER", points: 4 }
            ];

            sampleAnswers.forEach((answer, index) => {
                document.getElementById(`answer${index}`).value = answer.text;
                document.getElementById(`points${index}`).value = answer.points;
            });
        }

        function saveGame() {
            const question = document.getElementById('questionInput').value;
            if (!question.trim()) {
                alert('Please enter a question!');
                return;
            }

            const answers = [];
            for (let i = 0; i < 8; i++) {
                const text = document.getElementById(`answer${i}`).value.trim();
                const points = parseInt(document.getElementById(`points${i}`).value) || 0;
                
                if (text && points > 0) {
                    answers.push({ text: text.toUpperCase(), points: points });
                }
            }

            if (answers.length === 0) {
                alert('Please enter at least one answer with points!');
                return;
            }

            // Sort answers by points (descending)
            answers.sort((a, b) => b.points - a.points);

            currentGame = {
                question: question,
                answers: answers,
                revealedAnswers: new Array(answers.length).fill(false),
                strikes: 0,
                score: 0,
                currentAnswerIndex: 0
            };

            document.getElementById('setupPanel').classList.add('hidden');
            startGame();
        }

        function startGame() {
            document.getElementById('questionText').textContent = currentGame.question;
            updateGameBoard();
            updateScore();
            updateStrikes();
        }

        function updateGameBoard() {
            const grid = document.getElementById('answersGrid');
            grid.innerHTML = '';

            currentGame.answers.forEach((answer, index) => {
                const answerDiv = document.createElement('div');
                answerDiv.className = 'answer-item';
                answerDiv.onclick = () => toggleAnswer(index);
                
                if (currentGame.revealedAnswers[index]) {
                    answerDiv.classList.add('revealed');
                }

                answerDiv.innerHTML = `
                    <div class="answer-number">${index + 1}</div>
                    <div class="answer-text ${currentGame.revealedAnswers[index] ? '' : 'hidden-text'}">
                        ${answer.text}
                    </div>
                    <div class="answer-points ${currentGame.revealedAnswers[index] ? '' : 'hidden-text'}">
                        ${answer.points}
                    </div>
                `;

                grid.appendChild(answerDiv);
            });
        }

        function toggleAnswer(index) {
            if (!currentGame.revealedAnswers[index]) {
                currentGame.revealedAnswers[index] = true;
                currentGame.score += currentGame.answers[index].points;
                updateGameBoard();
                updateScore();
            }
        }

        function revealAnswer() {
            // Find the next unrevealed answer
            for (let i = 0; i < currentGame.answers.length; i++) {
                if (!currentGame.revealedAnswers[i]) {
                    toggleAnswer(i);
                    break;
                }
            }
        }

        function addStrike() {
            if (currentGame.strikes < 3) {
                currentGame.strikes++;
                updateStrikes();
                
                // Add wrong animation to a random unrevealed answer
                const unrevealedIndexes = currentGame.revealedAnswers
                    .map((revealed, index) => revealed ? null : index)
                    .filter(index => index !== null);
                
                if (unrevealedIndexes.length > 0) {
                    const randomIndex = unrevealedIndexes[Math.floor(Math.random() * unrevealedIndexes.length)];
                    const answerItems = document.querySelectorAll('.answer-item');
                    answerItems[randomIndex].classList.add('wrong');
                    setTimeout(() => {
                        answerItems[randomIndex].classList.remove('wrong');
                    }, 500);
                }
            }
        }

        function updateStrikes() {
            const strikesDiv = document.getElementById('strikes');
            const xMarks = '✖'.repeat(currentGame.strikes);
            strikesDiv.innerHTML = Array.from(xMarks).map(x => `<span class="x-mark">${x}</span>`).join('');
        }

        function updateScore() {
            document.getElementById('score').textContent = `Score: ${currentGame.score}`;
        }

        function resetGame() {
            currentGame.revealedAnswers = new Array(currentGame.answers.length).fill(false);
            currentGame.strikes = 0;
            currentGame.score = 0;
            updateGameBoard();
            updateScore();
            updateStrikes();
        }

        function showSetup() {
            document.getElementById('setupPanel').classList.remove('hidden');
        }

        // Initialize the game
        initializeSetup();
        loadSampleGame(); // Load sample by default
        document.getElementById('setupPanel').classList.remove('hidden');
    </script>
</body>
</html>
